    --muted:  #64748b;
    --border: rgba(14,165,233,0.18);

  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #040810;
    color: #e2e8f0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .toolbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(4,8,16,0.96);
    border-bottom: 1px solid rgba(14,165,233,0.2);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .toolbar-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 0.08em;
  }
  .toolbar-sep { color: var(--muted); }
  .mode-btn {
    background: rgba(14,165,233,0.08);
    border: 1px solid rgba(14,165,233,0.25);
    color: var(--muted);
    padding: 5px 14px;
    border-radius: 5px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    transition: all 0.15s;
  }
  .mode-btn.active {
    background: rgba(14,165,233,0.2);
    border-color: var(--blue);
    color: var(--blue);
  }
  .toolbar-hint {
    font-size: 10px;
    color: var(--muted);
    margin-left: auto;
    letter-spacing: 0.03em;
  }

  .atlas-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 14px 16px 6px;
    opacity: 0.6;
  }

  .card-grid {
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 0 16px 20px;
    max-width: 900px;
    margin: 0 auto;
  }

  .game-card {
    background-image: linear-gradient(to right,
      #0d1a2e 0%, #0d1a2e 29%,
      #0a2540 29%, #0a2540 71%,
      #0d1a2e 71%, #0d1a2e 100%
    );
    background-size: cover;
    background-position: center;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: default;
    position: relative;
    overflow: hidden;
    height: 130px;
    box-sizing: border-box;
    border-left-width: 3px;
  }
  .game-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.05) 45%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 0;
  }

  .game-card[data-genre-group="Shooter"]    { border-left-color: #ef4444; }
  .game-card[data-genre-group="Puzzle"]     { border-left-color: #06b6d4; }
  .game-card[data-genre-group="Sports"]     { border-left-color: #22c55e; }
  .game-card[data-genre-group="Rhythm"]     { border-left-color: #ec4899; }
  .game-card[data-genre-group="RPG"]        { border-left-color: #a855f7; }
  .game-card[data-genre-group="Strategy"]   { border-left-color: #f97316; }
  .game-card[data-genre-group="Fitness"]    { border-left-color: #84cc16; }
  .game-card[data-genre-group="Simulation"] { border-left-color: #0ea5e9; }
  .game-card[data-genre-group="Adventure"]  { border-left-color: #f59e0b; }
  .game-card[data-genre-group="Action"]     { border-left-color: #fb923c; }
  .game-card[data-genre-group="Arcade"]     { border-left-color: #eab308; }
  .game-card[data-genre-group="Casual"]     { border-left-color: #94a3b8; }
  .game-card[data-genre-group="Other"]      { border-left-color: #64748b; }

  .card-title-block {
    position: absolute;
    top: 10px;
    left: 12px;
    max-width: 65%;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
  }
  .card-name-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: nowrap;
  }
  .game-name {
    display: inline-block;
    font-size: 13px;
    font-weight: 600;
    color: #f1f5f9;

    overflow-wrap: break-word;
    word-break: normal;
    background: rgba(0,0,0,0.55);

    padding: 4px 8px;

  .game-genre {
    display: inline-block;
    font-size: 10px;
    color: #f1f5f9;
    font-weight: 300;
    margin-top: 0;
    background: rgba(0,0,0,0.45);
    border-radius: 4px;
    padding: 2px 7px;

  .game-genre-indie {
    color: #a855f7;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .card-top-right {
    position: absolute;
    top: 10px;
    right: 12px;
    z-index: 2;
  }
  .star-btn {

    font-size: 16px;
    line-height: 1;
    padding: 4px 6px;
    border-radius: 5px;
    flex-shrink: 0;
    opacity: 1;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));

  .card-bottom-left {
    position: absolute;
    bottom: 10px;
    left: 12px;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;

  .card-tags-row {

    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
  }
  .mp-badge {

    align-items: center;

    font-size: 9px;

    letter-spacing: 0.06em;
    padding: 2px 6px;

  .card-bottom-center {

    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .store-btn {

    border: 1px solid rgba(14,165,233,0.5);
    color: #7dd3fc;

    align-items: center;

<script>
function genreGroup(genre) {
  const g = genre.toLowerCase();
  if (['shooter','fps','tactical','survival'].some(x => g.includes(x))) return 'Shooter';
  if (['puzzle','mystery'].some(x => g.includes(x)))                    return 'Puzzle';
  if (['sport','golf','cricket','soccer','boxing','bowling','fishing'].some(x => g.includes(x))) return 'Sports';
  if (['rhythm','music'].some(x => g.includes(x)))                      return 'Rhythm';
  if (['rpg','roguelike','roguelite'].some(x => g.includes(x)))         return 'RPG';
  if (['strategy','tower','tabletop','naval'].some(x => g.includes(x))) return 'Strategy';
  if (['fitness','workout'].some(x => g.includes(x)))                   return 'Fitness';
  if (['sim','simulation'].some(x => g.includes(x)))                    return 'Simulation';
  if (['adventure','narrative','exploration'].some(x => g.includes(x))) return 'Adventure';
  if (g.includes('action'))                                              return 'Action';
  if (['racing','arcade'].some(x => g.includes(x)))                     return 'Arcade';
  if (['education','creative','social','casual','platformer'].some(x => g.includes(x))) return 'Casual';
  return 'Other';
}

function ratingHTML(g) {
  const count = g.reviews >= 1000
    ? (g.reviews / 1000).toFixed(1).replace('.0','') + 'K'
    : g.reviews;
  return `<div class="game-rating">
    <span class="stars">★</span>
    <span class="rating-num">${g.rating.toFixed(1)}</span>
    <span class="review-count">(${count})</span>
  </div>`;
}

function makeCard(g) {
  const gg = genreGroup(g.genre);
  const mpBadges = (g.mp||[]).map(m =>
    m === 'multi' ? '<span class="mp-badge multi">👥 MULTI</span>' :
    m === 'coop'  ? '<span class="mp-badge coop">🤝 CO-OP</span>' : ''
  ).join('');
  const tagInline = g.tag
    ? `<span class="tag-${g.tag.toLowerCase()}-inline">${g.tag}</span>`
    : '';
  const indieSpan = g.type === 'indie'
    ? ' · <span class="game-genre-indie">INDIE</span>'
    : '';

  const card = document.createElement('div');
  card.className = 'game-card';
  card.dataset.genreGroup = gg;
  card.innerHTML = `
    <div class="card-title-block">
      <div class="card-name-row">
        <div class="game-name">${g.name}</div>
        ${tagInline}
      </div>
      <span class="game-genre">${g.genre}${indieSpan}</span>
      ${mpBadges ? `<div class="card-tags-row">${mpBadges}</div>` : ''}
    </div>
    <div class="card-top-right">
      <button class="star-btn" title="Star">⭐</button>
    </div>
    <div class="card-bottom-left">
      ${g.rating ? ratingHTML(g) : ''}
    </div>
    <div class="card-bottom-center">
      <a class="store-btn" href="#" onclick="return false">🛒 <span>Store</span></a>
    </div>
    <div class="card-bottom-right">
      <button class="remove-btn" title="Hide">✕</button>
    </div>
  `;
  return card;
}

const ATLAS_SIZE = 8;

function render() {
  const container = document.getElementById('card-container');
  container.innerHTML = '';

  for (let a = 0; a < Math.ceil(allGames.length / ATLAS_SIZE); a++) {
    const batch = allGames.slice(a * ATLAS_SIZE, (a + 1) * ATLAS_SIZE);
    const label = document.createElement('div');
    label.className = 'atlas-label';
    label.textContent = `Atlas ${String(a + 1).padStart(2, '0')} — games ${a * ATLAS_SIZE + 1}–${Math.min((a + 1) * ATLAS_SIZE, allGames.length)}`;
    container.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'card-grid';
    batch.forEach(g => grid.appendChild(makeCard(g)));
    container.appendChild(grid);
  }
}

function setMode(mode) {
  document.body.className = mode + '-mode';
  document.getElementById('btn-mobile').classList.toggle('active', mode === 'mobile');
  document.getElementById('btn-pc').classList.toggle('active', mode === 'pc');
}

render();
</script>
